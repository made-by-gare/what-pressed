name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    environment: CI

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Tauri app
        run: cargo tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: List bundle output
        run: |
          Get-ChildItem -Recurse src-tauri/target/release/bundle/ | ForEach-Object { $_.FullName }

      - name: Generate latest.json for updater
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $repo = "${{ github.repository }}"
          $nsisZip = Get-ChildItem src-tauri/target/release/bundle/nsis/*.nsis.zip | Select-Object -First 1
          $nsisZipSig = Get-Content "$($nsisZip.FullName).sig" -Raw
          $nsisZipName = $nsisZip.Name
          $date = Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ"
          $json = @{
            version = $version
            notes = "See the assets on the release page."
            pub_date = $date
            platforms = @{
              "windows-x86_64" = @{
                signature = $nsisZipSig.Trim()
                url = "https://github.com/$repo/releases/download/v$version/$nsisZipName"
              }
            }
          } | ConvertTo-Json -Depth 4
          $json | Out-File -FilePath latest.json -Encoding utf8
          Write-Output "Generated latest.json"
          Get-Content latest.json

      - name: Create release and upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          name: "What Pressed ${{ github.ref_name }}"
          body: "See the assets below to download and install."
          files: |
            latest.json
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.msi.sig
            src-tauri/target/release/bundle/msi/*.msi.zip
            src-tauri/target/release/bundle/msi/*.msi.zip.sig
            src-tauri/target/release/bundle/nsis/*-setup.exe
            src-tauri/target/release/bundle/nsis/*-setup.exe.sig
            src-tauri/target/release/bundle/nsis/*.nsis.zip
            src-tauri/target/release/bundle/nsis/*.nsis.zip.sig
